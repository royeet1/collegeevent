define host{
    use                     linux-server
    host_name               collegeevent
    alias                   College Event Website
    address                 collegeevent
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service{
    use                     generic-service
    host_name               collegeevent
    service_description     HTTP
    check_command           check_http!-p 8081 -u /
}

define command {
    command_name    check_springboot_metric
    command_line    python3 $USER1$/check_springboot_metric.py -u http://$HOSTADDRESS$:8081/actuator/metrics/$ARG1$ -w $ARG2$ -c $ARG3$ $ARG4$
}

define service{
    use                     generic-service
    host_name               collegeevent
    service_description     CPU Usage
    check_command           check_springboot_metric!system.cpu.usage!0.80!0.90
}

define service{
    use                     generic-service
    host_name               collegeevent
    service_description     JVM Memory
    check_command           check_springboot_metric!jvm.memory.used!2147483648!2684354560
}

define service{
    use                     generic-service
    host_name               collegeevent
    service_description     Disk Space
    check_command           check_springboot_metric!disk.free!10737418240!5368709120!-l
}
